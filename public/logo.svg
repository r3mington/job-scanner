<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" fill="none">
  <defs>
    <!-- Clip everything drawn over the hex to stay inside its boundary -->
    <clipPath id="sai-hex-clip">
      <polygon points="29,13 72,13 93,50 72,87 29,87 7,50" />
    </clipPath>
  </defs>

  <!-- ── HEXAGON FILL ─────────────────────────────────────────────── -->
  <polygon points="29,13 72,13 93,50 72,87 29,87 7,50" fill="#f59e0b" />

  <!-- ── FRACTURE + SCAN LINE (clipped inside hex) ────────────────── -->
  <g clipPath="url(#sai-hex-clip)">
    <!-- Z-shaped crack: three connected segments forming a lightning-bolt -->
    <polyline
      points="38,13 58,40 30,61 46,87"
      stroke="#111318"
      stroke-width="5.5"
      stroke-linecap="butt"
      stroke-linejoin="miter"
      stroke-miterlimit="10"
      fill="none"
    />

    <!-- Horizontal amber scan line at vertical midpoint (y = 50) -->
    <line
      x1="7"  y1="50"
      x2="93" y2="50"
      stroke="#ffe380"
      stroke-width="1.5"
      opacity="0.8"
    />
  </g>

  <!-- ── WORDMARK ─────────────────────────────────────────────────── -->
  <text
    x="110"
    y="66"
    font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif"
    font-size="38"
    font-weight="700"
    fill="#f59e0b"
    letter-spacing="-0.5"
  >Sentinel AI</text>
</svg>
